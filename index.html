<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <link href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #top-display {
            position: fixed;
            top: 40px;
            left: calc(50% - 150px);
            width: 300px; /* A specific width is required */
            height: 50px;
            background-color: rgba(177, 0, 56, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 1);
            font-family: 'Consolas';
            border: 2px solid rgba(50, 0, 16, 0.6);
            transition: color 0.5s
        }

        #map {
            min-height: 500px;
            height: 100%;
            width: 100%;
            background: #0b0d23;
        }

        
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="top-display">
    </div>

    <script>
        let autoStart = true;
        let allCities;
        let currCitiesList = [];
        let currCity;
        $.getJSON("all_cities.json", (cities)=>{
            allCities = cities;
            for (c of cities) {
                if (c.country == "CN" && c.population > 5000000) {
                    currCitiesList.push(c);
                }
            }
            selectRandCity();
        });
        

        function selectRandCity() {
            let newCity;
            let i = 0;
            while (newCity === currCity || newCity === undefined) {
                newCity = currCitiesList[Math.floor(Math.random()*currCitiesList.length)];
                i++;
                if (i > 100) break;
            }

            currCity = newCity;
            $("#top-display")[0].innerText = currCity.name + ((currCity.region == "N/A" || currCity.region.split(" ")[0] == currCity.name) ? "" : ", " + currCity.region);
        }

        let style = {
            version: 8,
            sources: {
                'satellite-tiles': {
                    type: 'raster',
                    tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                    tileSize: 256,
                    attribution: 'Tiles &copy; Esri'
                }
            },
            layers: [{
                id: 'satellite-layer',
                type: 'raster',
                source: 'satellite-tiles'
            }],
            projection: { type: "globe" }
        }

        const map = new maplibregl.Map({
            container: "map",
            style: style,
            zoom: 2,
            center: [0, 0],
            maxPitch: 85,
            canvasContextAttributes: { antialias: true },
        })//.addControl(new maplibregl.NavigationControl(), "top-right");

        let clickMarker;
        let locMarker;
        let opacityInterval;
        let markerOpacity = 1;
        map.on("click", (e)=> {
            if (clickMarker) {clickMarker.remove()}
            if (locMarker) {locMarker.remove()}

            clickMarker = new maplibregl.Marker({color: "#FF0000"}).setLngLat([e.lngLat.lng, e.lngLat.lat]).addTo(map);
            locMarker = new maplibregl.Marker({color: "#00FF00"}).setLngLat([currCity.longitude, currCity.latitude]).addTo(map);
            $("#top-display")[0].style.color = "rgba(255, 255, 255, 0)"

            if (autoStart) {
                opacityInterval = setInterval(() => {
                    markerOpacity -= 0.03;
                    clickMarker.setOpacity(Math.pow(markerOpacity, 2), markerOpacity/5);
                    locMarker.setOpacity(Math.pow(markerOpacity, 2), markerOpacity/5);
                })

                setTimeout(() => {
                    selectRandCity();
                    $("#top-display")[0].style.color = "rgba(255, 255, 255, 1)";
                    clearInterval(opacityInterval);
                    markerOpacity = 1;
                }, 500);
            }
        })

    </script>
</body>

</html>

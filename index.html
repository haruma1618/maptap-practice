<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <link href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Consolas';
            color: rgba(255, 255, 255, 1);
        }

        #top-display {
            position: fixed;
            top: 40px;
            left: calc(50% - 175px);
            width: 350px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(177, 0, 56, 0.6);
            border: 2px solid rgba(50, 0, 16, 0.6);
            font-size: 18px;
        }

        #left-panel {
            position: fixed;
            top: calc(50% - 250px);
            left: 30px;
            width: 250px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(177, 0, 56, 0.4);
            border: 2px solid rgba(50, 0, 16, 0.4);
            font-size: 14px;
        }

        #left-hide-btn {
            position: fixed;
            top: calc(50% - 285px);
            left: 30px;
            width: 25px;
            height: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(177, 0, 56, 0.4);
            border: 2px solid rgba(50, 0, 16, 0.4);
            font-size: 14px;
            cursor: pointer;
        }

        #right-panel {
            position: fixed;
            top: calc(50% - 250px);
            right: 30px;
            width: 250px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(177, 0, 56, 0.4);
            border: 2px solid rgba(50, 0, 16, 0.4);
            font-size: 14px;
            overflow: auto;
        }

        .history-elem {
            width: 90%;
            margin-left: 10px;
            margin-right: 10px;
            margin-top: 5px;
            padding-top: 10px;
            padding-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #map {
            min-height: 500px;
            height: 100%;
            width: 100%;
            background: #0b0d23;
        }

        .dist-popup {
            font-family: 'Consolas';
            font-size: 20px;
            text-align: center;
            opacity: 1;
            position: fixed;
        }

        input[type="number"] {
            font-family: 'Consolas';
            border-radius: 0;
            border: 1px solid rgb(0, 0, 0);
            background-color: rgb(50, 0, 16);
            color: white;
            appearance: textfield;
        }

        button, select {
            font-family: 'Consolas';
            border-radius: 0;
            border: 1px solid rgb(0, 0, 0);
            background-color: rgb(50, 0, 16);
            color: white;
            cursor: pointer;
        }

        @keyframes move-popup-text {
            0% {transform: translate(0, 0); opacity: 1;}
            100% {transform: translate(0, -50px); opacity: 0;}
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="top-display"></div>
    <div id="left-hide-btn">&lt;</div>
    <div id="left-panel">
        <div style="margin-bottom: 20px">
            <label for="map-select">Select map:</label>
            <select id="map-select" name="map-select">
                <option value="china">China</option>
                <option value="india">India</option>
                <option value="usa">United States</option>
                <option value="brazil">Brazil</option>
                <option value="indonesia">Indonesia</option>
                <option value="russia">Russia</option>
                <option value="canada">Canada</option>
                <option value="japan">Japan</option>
                <option value="mexico">Mexico</option>
                <option value="w-europe">Western Europe</option>
                <option value="e-europe">Eastern Europe</option>
                <option value="n-europe">Northern Europe</option>
                <option value="middle-east">Middle East</option>
                <option value="central-asia">Central Asia</option>
                <option value="se-asia">SE Asia (-Indo.)</option>
                <option value="custom">Custom map...</option>
            </select>
        </div>
        <div>
            <label for="min-population">Min. population:</label>
            <input type="number" id="min-population" name="min-population" value="1000000" style="width: 70px;">
        </div>
        <div>
            <label for="max-population">Max. population:</label>
            <input type="number" id="max-population" name="max-population" value="100000000" style="width: 70px;">
        </div>
        <div>
            <label for="locs-before-repeat">Min. before repeat: </label>
            <input type="number" id="locs-before-repeat" name="locs-before-repeat" value="10" style="width: 40px;">
        </div>
        <div style="margin-bottom: 20px"></div>
        <div>Possible locations: <span id="num-locs"></span></div>
        <div style="margin-bottom: 20px"></div>
        <div>
            <input type="checkbox" id="checkbox-outline">
            <span>Show country outline</span>
        </div>
        <div><input type="checkbox" id="checkbox-division-name" checked>
            <span>Show subdivision name</span>
        </div>
        <div>
            <input type="checkbox" id="checkbox-country-name">
            <span>Show country name</span>
        </div>
    </div>
    <div id="right-panel"></div>
    <div style="position: fixed; left: 0; bottom: 0; font-size: 14px;">
        Country outlines by: <a href="https://www.geoboundaries.org/" target="_blank" rel="noopener noreferrer">Geoboundaries</a>, <a href="https://datahub.io/core/geo-countries" target="_blank" rel="noopener noreferrer">Datahub</a>
    </div>

    <script>

        let minPopulation = Number($("#min-population")[0].value);
        let maxPopulation = Number($("#max-population")[0].value);
        let minBeforeRepeat = Number($("#locs-before-repeat")[0].value);
        let locHistory = [];
        let pastMarkerCoords = [];

        let showingLocMarker;

        let supportedADM1 = ["BR", "CA", "CN", "ID", "IN", "JP", "MX", "RU", "US"];
        let valueToCountries = {"usa": ["US"], "china": ["CN"], "india": ["IN"], "brazil": ["BR"], "indonesia": ["ID"], "russia": ["RU"], "canada": ["CA"], "japan": ["JP"], "mexico": ["MX"], 
        "w-europe": ["GB", "IE", "FR", "AD", "PT", "ES", "BE", "NL", "LU", "DE", "CH", "IT", "LI", "AT", "MC", "SM", "VA", "MT"],
        "e-europe": ["CZ", "PL", "LT", "SK", "HU", "SI", "HR", "BA", "ME", "RS", "MK", "AL", "XK", "GR", "BG", "RO", "MD", "UA", "BY"],
        "n-europe": ["LV", "EE", "FI", "SE", "NO", "IS", "DK"],
        "middle-east": ["BH", "CY", "EG", "IR", "IQ", "IL", "JO", "KW", "LB", "OM", "PS", "QA", "SA", "SY", "TR", "AE", "YE"],
        "central-asia": ["KG", "TJ", "TM", "UZ", "KZ", "AF"],
        "se-asia": ["BN", "KH", "LA", "MY", "MM", "PH", "SG", "TH", "TL", "VN"],
        "custom": ["CN"]};

        let cn_codes = {1:"Anhui",2:"Zhejiang",3:"Jiangxi",4:"Jiangsu",5:"Jilin",6:"Qinghai",7:"Fujian",8:"Heilongjiang",9:"Henan",10:"Hebei",11:"Hunan",12:"Hubei",13:"Xinjiang",14:"Tibet",15:"Gansu",16:"Guangxi",18:"Guizhou",19:"Liaoning",20:"Inner Mongolia",21:"Ningxia",22:"Beijing",23:"Shanghai",24:"Shanxi",25:"Shandong",26:"Shaanxi",28:"Tianjin",29:"Yunnan",30:"Guangdong",31:"Hainan",32:"Sichuan",33:"Chongqing"};
        let in_codes = {1:"Andaman and Nicobar",2:"Andhra Pradesh",3:"Assam",5:"Chandigarh",7:"Delhi",9:"Gujarat",10:"Haryana",11:"Himachal Pradesh",12:"Jammu and Kashmir",13:"Kerala",14:"Lakshadweep",16:"Maharashtra",17:"Manipur",18:"Meghalaya",19:"Karnataka",20:"Nagaland",21:"Odisha",22:"Puducherry",23:"Punjab",24:"Rajasthan",25:"Tamil Nadu",26:"Tripura",28:"West Bengal",29:"Sikkim",30:"Arunachal Pradesh",31:"Mizoram",33:"Goa",34:"Bihar",35:"Madhya Pradesh",36:"Uttar Pradesh",37:"Chhattisgarh",38:"Jharkhand",39:"Uttarakhand",40:"Telangana",41:"Ladakh"}
        let br_codes = {1:"Acre",2:"Alagoas",3:"Amapá",4:"Amazonas",5:"Bahia",6:"Ceará",7:"Distrito Federal",8:"Espírito Santo",11:"Mato Grosso do Sul",13:"Maranhão",14:"Mato Grosso",15:"Minas Gerais",16:"Pará",17:"Paraíba",18:"Paraná",20:"Piauí",21:"Rio de Janeiro",22:"Rio Grande do Norte",23:"Rio Grande do Sul",24:"Rondônia",25:"Roraima",26:"Santa Catarina",27:"São Paulo",28:"Sergipe",29:"Goiás",30:"Pernambuco",31:"Tocantins"};
        let us_codes = {"AL":"Alabama","AK":"Alaska","AS":"American Samoa","AZ":"Arizona","AR":"Arkansas","CA":"California","CO":"Colorado","CT":"Connecticut","DE":"Delaware","DC":"District Of Columbia","FL":"Florida","GA":"Georgia","GU":"Guam","HI":"Hawaii","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa","KS":"Kansas","KY":"Kentucky","LA":"Louisiana","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Mississippi","MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"New Hampshire","NJ":"New Jersey","NM":"New Mexico","NY":"New York","NC":"North Carolina","ND":"North Dakota","MP":"Northern Mariana Islands","OH":"Ohio","OK":"Oklahoma","OR":"Oregon","PA":"Pennsylvania","PR":"Puerto Rico","RI":"Rhode Island","SC":"South Carolina","SD":"South Dakota","TN":"Tennessee","TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","VI":"Virgin Islands","WA":"Washington","WV":"West Virginia","WI":"Wisconsin","WY":"Wyoming"}
        //let id_codes_f = {}

        $("#left-hide-btn")[0].addEventListener("click", (e)=>{
            $("#left-hide-btn")[0].innerHTML = ($("#left-hide-btn")[0].innerHTML != "&lt;" ? "&lt;" : "&gt;");
            $("#left-panel")[0].style.display = ($("#left-panel")[0].style.display != "none" ? "none" : "flex");
        })

        let citiesLoaded = false;
        $.getJSON("all_cities_p10000.json", (cities)=>{
            for (c of cities) {
                let o = {
                    name: c.name,
                    country: c.country_code,
                    country_name: iso2ToCountryName[c.country_code],
                    population: c.population,
                    latitude: c.coordinates.lat,
                    longitude: c.coordinates.lon,
                    region_code: c.admin1_code
                }

                allCities.push(o);

                /*if (o.country == "ID" && o.population > 100000) {
                    if (id_codes_f[o.region_code] === undefined) {
                        id_codes_f[o.region_code] = [];
                    }
                    id_codes_f[o.region_code].push(o.name)
                }*/
                if (o.country == "US") {
                    o.region = us_codes[o.region_code];
                }
                if (o.country == "IN") {
                    o.region = in_codes[parseInt(o.region_code)];
                }
                if (o.country == "CN") {
                    o.region = cn_codes[parseInt(o.region_code)];
                }
                if (o.country == "BR") {
                    o.region = br_codes[parseInt(o.region_code)];
                }
            }

            setCurrCountries();
            setMapSource();
            citiesLoaded = true;
        });

        function setCurrCities() {
            currCitiesList = [];
            for (o of allCities) {
                if (currCountriesList.includes(o.country) && o.population >= minPopulation && o.population <= maxPopulation) {
                    currCitiesList.push(o);
                }
            }
            locHistory = [];
            $("#num-locs")[0].innerText = currCitiesList.length;
        }

        $("#map-select")[0].addEventListener("input", (e)=>{
            if ($("#map-select")[0].value === "custom") {
                console.log("c")
                let countriesStr = prompt("Enter list of country codes (e.g. \"GB,FR,DE\")");

                if (countriesStr !== null) {
                    let countriesArr = countriesStr.split(",");
                    for (let i = 0; i < countriesArr.length; i++) {
                        countriesArr[i] = countriesArr[i].trim();
                    }

                    valueToCountries["custom"] = countriesArr;
                } else {
                    valueToCountries["custom"] = [];
                }
            }

            setCurrCountries();
            setMapSource();
        })

        function setCurrCountries() {
            let prevCountriesList = currCountriesList;
            let prevCountryMap = currCountryMap;

            let val = $("#map-select")[0].value;
            currCountryMap = val;

            if (valueToCountries[val] !== undefined) {
                currCountriesList = valueToCountries[val];
            }

            setCurrCities();
            if (currCitiesList.length == 0) {
                alert("No cities match the given restrictions");
                currCountriesList = prevCountriesList;
                $("#map-select")[0].value = prevCountryMap;
                setCurrCities();
            } else if (currCitiesList.length < minBeforeRepeat) {
                minBeforeRepeat = currCitiesList.length;
                $("#locs-before-repeat")[0].value = currCitiesList.length;
            }

            selectRandCity();
        }

        $("#min-population")[0].addEventListener("change", updateMapPreferences);
        $("#max-population")[0].addEventListener("change", updateMapPreferences);
        $("#locs-before-repeat")[0].addEventListener("change", updateMapPreferences);


        function updateMapPreferences(e) {
            if (!citiesLoaded) return;

            let minVal = $("#min-population")[0].value;
            if (Number(minVal) === NaN || minVal === "") {
                alert("Invalid value for: Minimum population");
                $("#min-population")[0].value = minPopulation.toString();
                return;
            }
            minVal = Number(minVal);

            let maxVal = $("#max-population")[0].value;
            if (Number(maxVal) === NaN || maxVal === "") {
                alert("Invalid value for: Maximum population");
                $("#max-population")[0].value = maxPopulation.toString();
                return;
            }
            maxVal = Number(maxVal);

            let minBeforeRepeatVal = $("#locs-before-repeat")[0].value;
            if (Number(minBeforeRepeatVal) === NaN || minBeforeRepeatVal === "") {
                alert("Invalid value for: Min # of cities before repeat");
                $("#locs-before-repeat")[0].value = minBeforeRepeat.toString();
                return;
            }
            minBeforeRepeatVal = Number(minBeforeRepeatVal);

            let prevMin = minPopulation;
            minPopulation = minVal;
            let prevMax = maxPopulation;
            maxPopulation = maxVal;
            let prevMinBeforeRepeat = minBeforeRepeat;
            minBeforeRepeat = minBeforeRepeatVal;

            setCurrCities();

            let invalid = false;

            if (currCitiesList.length == 0) {
                alert("No cities match the given restrictions");
                invalid = true;
            } else if (minBeforeRepeatVal > currCitiesList.length) {
                alert("Min # of cities before repeat cannot be higher than total number of cities");
                invalid = true;
            }

            if (invalid) {
                minPopulation = prevMin;
                maxPopulation = prevMax;
                minBeforeRepeat = prevMinBeforeRepeat;
                $("#min-population")[0].value = prevMin.toString();
                $("#max-population")[0].value = prevMax.toString();
                $("#locs-before-repeat")[0].value = prevMinBeforeRepeat.toString();
                setCurrCities();
            }
        }
        
        $("#top-display")[0].style.transition = "color " + fadeTime/1000 + "s";

        function selectRandCity() {
            let newCity;
            let i = 0;
            let validCity = false;

            while (!validCity) {
                newCity = currCitiesList[Math.floor(Math.random()*currCitiesList.length)];
                
                validCity = true;
                for (let i = 0; i < minBeforeRepeat-1; i++) {
                    if (locHistory[i] === newCity) {
                        validCity = false;
                    }
                }

                i++;
                if (i > 100) break;
            }

            locHistory.unshift(newCity);
            console.log(locHistory);
            currCity = newCity;

            let displayText = currCity.name;

            if (showDivision && currCity.region) {
                displayText += ", " + currCity.region;
            };
            if (showCountry && currCity.country_name) {
                displayText += ", " + currCity.country_name;
            }

            $("#top-display")[0].innerText = displayText;
        }

        let style = {
            version: 8,
            sources: {
                'satellite-tiles': {
                    type: 'raster',
                    tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                    tileSize: 256,
                    attribution: 'Tiles &copy; Esri'
                }
            },
            layers: [{
                id: 'satellite-layer',
                type: 'raster',
                source: 'satellite-tiles'
            }],
            projection: { type: "globe" }
        }

        const map = new maplibregl.Map({
            container: "map",
            style: style,
            zoom: 2,
            center: [0, 0],
            maxPitch: 85,
            canvasContextAttributes: { antialias: true },
        })

        let outlineLayer = {
            'id': 'polygons-stroke',
            'type': 'line',
            'source': 'uploaded-source',
            'paint': {
                'line-color': '#A00000',
                'line-width': 1.5
            }
        };

        function setMapSource() {
            if (map.getLayer('polygons-stroke')) {
                map.removeLayer('polygons-stroke');
            }
            if (map.getSource("uploaded-source")) {
                map.removeSource("uploaded-source");
            }
            
            if (currCountriesList.length === 1 && supportedADM1.includes(currCountriesList[0])) {
                $.getJSON("geojson_data/" + currCountriesList[0] + ".geojson", (gj)=>{
                    map.addSource('uploaded-source', {
                        'type': 'geojson',
                        'data': gj
                    });

                    if ($("#checkbox-outline")[0].checked) {
                        map.addLayer(outlineLayer);
                    }
                })
            } else {
                let combinedFeatures = [];

                $.getJSON("all_countries.geojson", (data)=>{
                    for (let f of data.features) {
                        if (currCountriesList.includes(f.properties["ISO3166-1-Alpha-2"])) {
                            console.log(f);
                            combinedFeatures.push(f);
                        }
                    }

                    map.addSource('uploaded-source', {
                        'type': 'geojson',
                        'data': {
                            "type": "FeatureCollection",
                            "features": combinedFeatures
                        }
                    });

                    if ($("#checkbox-outline")[0].checked) {
                        map.addLayer(outlineLayer);
                    };
                })
            }
        }

        map.on("load", (e)=> {
            map.doubleClickZoom.disable();
        });
        
        $("#checkbox-outline")[0].addEventListener("change", addCountryOutlines);

        function addCountryOutlines() {
            if (!map.isStyleLoaded() || !map.getSource("uploaded-source")) return;
            if ($("#checkbox-outline")[0].checked) {
                map.addLayer(outlineLayer);
            } else {
                if (map.getLayer("polygons-stroke")) {
                    map.removeLayer("polygons-stroke");
                }
            }
        }

        $("#checkbox-division-name")[0].addEventListener("change", (e)=>{
            showDivision = e.currentTarget.checked;
        })
        $("#checkbox-country-name")[0].addEventListener("change", (e)=>{
            showCountry = e.currentTarget.checked;
        })

        let clickMarker;
        let locMarker;
        let opacityInterval;
        let markerOpacity = 1;
        map.on("click", (e)=> {
            if (inTransition) return;

            let pxl = map.project([e.lngLat.lng, e.lngLat.lat]);
            if (Math.pow(pxl.x - mouseX, 2) + Math.pow(pxl.y - mouseY, 2) > 4) return;
            
            inTransition = true;
            if (clickMarker) {clickMarker.remove()}
            if (locMarker) {locMarker.remove()}

            clickMarker = new maplibregl.Marker({color: "#FF0000"}).setLngLat([e.lngLat.lng, e.lngLat.lat]).addTo(map);
            locMarker = new maplibregl.Marker({color: "#00FF00"}).setLngLat([currCity.longitude, currCity.latitude]).addTo(map);
            $("#top-display")[0].style.color = "rgba(255, 255, 255, 0)";

            pastMarkerCoords.push([[e.lngLat.lng, e.lngLat.lat], [currCity.longitude, currCity.latitude]]);

            let distFromClick = distanceKm(e.lngLat.lat, currCity.latitude, e.lngLat.lng, currCity.longitude);
            let score = 1000*Math.exp(-(distFromClick / 16250) * 3.5);

            let distPopup = document.createElement("div");
            distPopup.classList.add("dist-popup");
            distPopup.style.animation = "move-popup-text " + 1.5*fadeTime/1000 + "s";
            distPopup.innerHTML = Math.round(score) + "/1000" + "<br>" + distFromClick.toFixed(2) + " km";
            distPopup.style.width = 200 + "px";
            distPopup.style.left = mouseX - 100 + "px";
            distPopup.style.top = mouseY - 50 + "px";
            distPopup.addEventListener('animationend', distPopup.remove);
            distPopup.style.color = "hsl(" + (240 * (1-score/1000)) + ", 100%, 60%)";
            distPopup.style["-webkit-text-stroke"] = "0.75px hsl(" + (240 * (1-score/1000)) + ", 100%, 20%)";
            $("body")[0].appendChild(distPopup);

            let historyElem = document.createElement("div");
            historyElem.classList.add("history-elem");
            let locationNameElem = document.createElement("div");
            locationNameElem.innerText = $("#top-display")[0].innerText;
            historyElem.appendChild(locationNameElem);
            let scoreElem = document.createElement("div");
            scoreElem.innerText = Math.round(score) + "/1000" + " (" + distFromClick.toFixed(2) + " km)";
            scoreElem.style.color = "hsl(" + (240 * (1-score/1000)) + ", 100%, 85%)";
            //scoreElem.style["-webkit-text-stroke"] = "0.75px hsl(" + (180 - 180*score/1000) + ", 100%, 40%)";
            historyElem.appendChild(scoreElem);
            historyElem.setAttribute("data-marker-ind", pastMarkerCoords.length-1)

            historyElem.addEventListener("mouseenter", (e)=>{
                let markerPositions = pastMarkerCoords[e.currentTarget.getAttribute("data-marker-ind")];

                showingClickMarker = new maplibregl.Marker({color: "#800000"}).setLngLat(markerPositions[0]).addTo(map);
                showingLocMarker = new maplibregl.Marker({color: "#008000"}).setLngLat(markerPositions[1]).addTo(map);
            });

            historyElem.addEventListener("mouseleave", (e)=>{
                if (showingClickMarker) {showingClickMarker.remove();}
                if (showingLocMarker) {showingLocMarker.remove();}
            });

            $("#right-panel")[0].prepend(historyElem);
            if ($("#right-panel")[0].children.length > 50) {
                $("#right-panel")[0].removeChild($("#right-panel")[0].lastElementChild);
            }

            let historyElems = $("#right-panel")[0].children
            for (let i = 0; i < historyElems.length; i++) {
                if (i !== 0) {
                    historyElems[i].style.backgroundColor = "rgba(177, 0, 0, 0.4)";
                } else {
                    historyElems[i].style.backgroundColor = "rgba(255, 90, 90, 0.4)";
                }
            };

            if (autoStart) {
                opacityInterval = setInterval(() => {
                    markerOpacity = Math.max(0, markerOpacity-1/(fadeTime/20));
                    clickMarker.setOpacity(Math.pow(markerOpacity, 2), Math.pow(markerOpacity, 2)/5);
                    locMarker.setOpacity(Math.pow(markerOpacity, 2), Math.pow(markerOpacity, 2)/5);
                })

                setTimeout(() => {
                    selectRandCity();
                    $("#top-display")[0].style.color = "rgba(255, 255, 255, 1)";
                    clearInterval(opacityInterval);
                    markerOpacity = 1;
                    inTransition = false;
                }, fadeTime);
            }
        })

        document.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        })

        // Haversine formula https://www.geeksforgeeks.org/dsa/program-distance-two-points-earth/
        function distanceKm(lat1, lat2, lon1, lon2) {
            lon1 = lon1 * Math.PI / 180;
            lon2 = lon2 * Math.PI / 180;
            lat1 = lat1 * Math.PI / 180;
            lat2 = lat2 * Math.PI / 180;
    
            let dlon = lon2 - lon1; 
            let dlat = lat2 - lat1;
            let a = Math.pow(Math.sin(dlat / 2), 2)
                    + Math.cos(lat1) * Math.cos(lat2)
                    * Math.pow(Math.sin(dlon / 2),2);
                
            let c = 2 * Math.asin(Math.sqrt(a));
            let r = 6371;
    
            return c * r;
        }

    </script>
</body>
